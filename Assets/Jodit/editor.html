<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jodit Editor</title>
<link rel="stylesheet" href="jodit.fat.min.css">
<style>
    body { margin: 0; padding: 0; font-family: 'Malgun Gothic', Arial, sans-serif; font-size: 12px; line-height: 1.3; }
    #editor { width: 100%; height: 100%; }
</style>
</head>
<body>
<textarea id="editor"></textarea>
<script src="jodit.fat.min.js"></script>
<script>
    function setEditorMode(mode) {
        if (mode === 'ReadOnly') {
            editor.setReadOnly(true);
            if (editor.toolbar) editor.toolbar.container.style.display = 'none';
            if (editor.statusbar) editor.statusbar.container.style.display = 'none';
            // ReadOnly: 내부 스크롤 비활성화, 콘텐츠 높이 보고
            var area = editor.editor || editor.container;
            if (area) {
                area.style.overflow = 'hidden';
            }
            document.body.style.overflow = 'hidden';
            // 여러 타이밍에 높이 측정 (콘텐츠 렌더링 + 이미지 로딩 대기)
            setTimeout(reportContentHeight, 100);
            setTimeout(reportContentHeight, 500);
            setTimeout(reportContentHeight, 1500);
            // 이미지 로딩 완료 후 높이 재측정
            var images = area ? area.querySelectorAll('img') : [];
            images.forEach(function(img) {
                if (!img.complete) {
                    img.addEventListener('load', reportContentHeight);
                }
            });
        }
        else if (mode === 'Simple') {
            editor.setReadOnly(false);
            if (editor.toolbar) editor.toolbar.container.style.display = 'none';
            if (editor.statusbar) editor.statusbar.container.style.display = 'none';
            document.body.style.overflow = '';
        }
        else if (mode === 'Full') {
            editor.setReadOnly(false);
            if (editor.toolbar) editor.toolbar.container.style.display = '';
            if (editor.statusbar) editor.statusbar.container.style.display = '';
            document.body.style.overflow = '';
        }
    }

    function reportContentHeight() {
        var area = editor.editor;
        if (area && window.chrome && window.chrome.webview) {
            var h = area.scrollHeight + 20;
            window.chrome.webview.postMessage(JSON.stringify({
                type: 'contentHeight',
                height: h
            }));
        }
    }

    async function optimizeImage(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const maxWidth = 1920;
                    const maxHeight = 1080;
                    const maxSizeKB = 500;

                    let width = img.width;
                    let height = img.height;

                    if (width > maxWidth || height > maxHeight) {
                        const ratio = Math.min(maxWidth / width, maxHeight / height);
                        width = Math.floor(width * ratio);
                        height = Math.floor(height * ratio);
                    }

                    canvas.width = width;
                    canvas.height = height;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    let quality = 0.85;
                    const tryCompress = (q) => {
                        canvas.toBlob((blob) => {
                            if (blob) {
                                const sizeKB = blob.size / 1024;
                                if (sizeKB > maxSizeKB && q > 0.5) {
                                    tryCompress(q - 0.1);
                                    return;
                                }
                                const reader2 = new FileReader();
                                reader2.onloadend = () => resolve(reader2.result);
                                reader2.readAsDataURL(blob);
                            } else {
                                tryCompressJPEG(quality);
                            }
                        }, 'image/webp', q);
                    };

                    const tryCompressJPEG = (q) => {
                        canvas.toBlob((blob) => {
                            const sizeKB = blob.size / 1024;
                            if (sizeKB > maxSizeKB && q > 0.5) {
                                tryCompressJPEG(q - 0.1);
                                return;
                            }
                            const reader2 = new FileReader();
                            reader2.onloadend = () => resolve(reader2.result);
                            reader2.readAsDataURL(blob);
                        }, 'image/jpeg', q);
                    };

                    tryCompress(quality);
                };
                img.onerror = reject;
                img.src = e.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    const config = {
        fullsize: true,
        height: '100%',
        language: 'ko',
        toolbarButtonSize: 'small',
        buttons: 'bold,italic,underline,strikethrough,|,ul,ol,|,font,fontsize,brush,paragraph,|,image,table,link,|,align,undo,redo,|,hr,eraser,fullsize,|,print',
        uploader: {
            insertImageAsBase64URI: true,
            imagesExtensions: ['jpg', 'png', 'jpeg', 'gif', 'svg', 'webp']
        },
        askBeforePasteHTML: false,
        askBeforePasteFromWord: false,
        defaultActionOnPaste: 'insert_only_text',
        processPasteHTML: false,
        showCharsCounter: false,
        showWordsCounter: false,
        showXPathInStatusbar: false,
        beautifyHTML: false,
        sourceEditor: 'area',
        disablePlugins: 'file,video,speech-recognize,preview,about'
    };

    const editor = new Jodit('#editor', config);

    document.addEventListener('keydown', function(e) {
        if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
            e.stopPropagation();
        }
    }, true);

    window.editor = editor;

    let changeTimeout;
    let lastContent = '';
    let lastSentTime = Date.now();
    const MIN_UPDATE_INTERVAL = 300;

    editor.events.on('change', function() {
        clearTimeout(changeTimeout);
        changeTimeout = setTimeout(() => {
            const currentContent = editor.value;
            const now = Date.now();

            if (currentContent !== lastContent && (now - lastSentTime) >= MIN_UPDATE_INTERVAL) {
                lastContent = currentContent;
                lastSentTime = now;

                if (window.chrome && window.chrome.webview) {
                    window.chrome.webview.postMessage(JSON.stringify({
                        type: 'contentChanged',
                        content: currentContent,
                        plainText: editor.text
                    }));
                }
            }
        }, 150);
    });

    // insertImage 원본 저장 (오버라이드 전)
    const originalInsertImage = editor.selection.insertImage;
    editor.selection.insertImage = async function(url, styles, defaultWidth) {
        if (!url.startsWith('data:image') && !url.startsWith('blob:')) {
            return originalInsertImage.call(this, url, styles, defaultWidth);
        }
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const file = new File([blob], 'image.png', { type: blob.type });
            const optimizedUrl = await optimizeImage(file);
            return originalInsertImage.call(this, optimizedUrl, styles, defaultWidth);
        } catch (err) {
            console.error('[image optimize failed]', err);
            return originalInsertImage.call(this, url, styles, defaultWidth);
        }
    };

    editor.events.on('beforeImageUpload', async function() {
        return false;
    });

    // 붙여넣기 전 가로채기: 엑셀 표 → HTML 테이블, 이미지 → 최적화 후 삽입
    // ※ 반드시 동기 함수여야 return false로 Jodit 기본 처리를 차단할 수 있음
    editor.events.on('beforePaste', function(e) {
        const clipboardData = e.clipboardData || window.clipboardData;
        if (!clipboardData) return;

        const items = clipboardData.items;
        const htmlData = clipboardData.getData('text/html');
        const textData = clipboardData.getData('text/plain');

        // 이미지 아이템 확인
        let hasImage = false;
        let imageItem = null;
        if (items) {
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    hasImage = true;
                    imageItem = items[i];
                    break;
                }
            }
        }

        // Case 1: HTML이 있는 경우 (엑셀/워드 등) → HTML 테이블로 삽입, 이미지 무시
        if (htmlData && htmlData.trim().length > 0) {
            e.preventDefault();
            e.stopPropagation();

            // 엑셀/워드 HTML에서 불필요한 메타/스타일 태그 정리
            let cleanHtml = htmlData;
            // <html>, <head>, <body> 등 외부 래퍼 제거
            const bodyMatch = cleanHtml.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
            if (bodyMatch) {
                cleanHtml = bodyMatch[1];
            }
            // <!--...--> 주석 제거
            cleanHtml = cleanHtml.replace(/<!--[\s\S]*?-->/g, '');
            // style 태그 제거 (인라인 style 속성은 유지)
            cleanHtml = cleanHtml.replace(/<style[^>]*>[\s\S]*?<\/style>/gi, '');
            // meta, link 태그 제거
            cleanHtml = cleanHtml.replace(/<meta[^>]*>/gi, '');
            cleanHtml = cleanHtml.replace(/<link[^>]*>/gi, '');

            editor.selection.insertHTML(cleanHtml.trim());
            return false;
        }

        // Case 2: 이미지만 있는 경우 (스크린샷, 이미지 복사) → 비동기 처리
        // return false로 즉시 차단 후, 비동기로 이미지 삽입
        if (hasImage && imageItem) {
            e.preventDefault();
            e.stopPropagation();

            const file = imageItem.getAsFile();
            if (file) {
                optimizeImage(file).then(function(optimizedDataUrl) {
                    const origInsert = originalInsertImage || editor.selection.insertImage;
                    origInsert.call(editor.selection, optimizedDataUrl);
                }).catch(function(err) {
                    console.error('[image optimize failed]', err);
                });
            }
            return false;
        }

        // Case 3: 텍스트만 있는 경우 → Jodit 기본 처리
    });

    editor.events.on('drop', async function(e) {
        const dt = e.dataTransfer;

        if (dt.files && dt.files.length > 0) {
            for (let i = 0; i < dt.files.length; i++) {
                const file = dt.files[i];
                if (file.type.startsWith('image/')) {
                    e.preventDefault();
                    e.stopPropagation();
                    try {
                        const optimizedUrl = await optimizeImage(file);
                        editor.selection.insertImage(optimizedUrl);
                    } catch (err) {
                        console.error('[image drop failed]', err);
                    }
                    return false;
                }
            }
        }

        const html = dt.getData('text/html');
        const text = dt.getData('text/plain');

        if (html || text) {
            e.preventDefault();
            e.stopPropagation();
            editor.selection.insertHTML(html || text);
            return false;
        }
    });

    // Signal ready
    if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage(JSON.stringify({ type: 'ready' }));
    }

    console.log('[JoditEditor] Virtual Host init complete');
</script>
</body>
</html>
